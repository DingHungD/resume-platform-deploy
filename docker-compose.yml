

services:
  db:
    image: ankane/pgvector:latest # 使用支援向量搜尋的 PostgreSQL 映像檔
    container_name: resume_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.ds
    networks:
      - resume_network

  redis:
    image: redis:7-alpine
    container_name: resume_redis
    networks:
      - resume_network

  backend:
    build: ../resume-platform-backend
    container_name: resume_backend
    volumes:
      - ../resume-platform-backend:/app
      - ../resume-platform-backend/uploads:/app/uploads
    env_file: .env
    depends_on:
      - db
      - redis
    networks:
      - resume_network

  worker:
    build: ../resume-platform-worker
    container_name: resume_worker
    env_file: .env
    depends_on:
      - db
      - redis
    networks:
      - resume_network

  frontend:
    build: ../resume-platform-frontend
    container_name: resume_frontend
    networks:
      - resume_network

  nginx:
    image: nginx:alpine
    container_name: resume_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - resume_network

networks:
  resume_network:
    driver: bridge

volumes:
  postgres_data: